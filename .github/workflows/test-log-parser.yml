name: test-log-parser

"on":
  push:
    paths:
      - 'log-parser/**'
  pull_request:
    paths:
      - 'log-parser/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r log-parser/requirements.txt
      - run: pytest log-parser/